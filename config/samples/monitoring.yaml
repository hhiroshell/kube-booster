apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
# Prometheus – ServiceAccount, RBAC, config, and deployment
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-booster-prometheus
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-booster-prometheus
rules:
- apiGroups: [""]
  resources: ["pods", "nodes", "endpoints", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-booster-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-booster-prometheus
subjects:
- kind: ServiceAccount
  name: kube-booster-prometheus
  namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/rules.yaml

    scrape_configs:
      - job_name: 'kube-booster'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Keep only kube-booster pods
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: kube-booster
            action: keep
          # Keep only the metrics port (8080)
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "8080"
            action: keep
          # Use pod name as instance label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          # Preserve namespace label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace

  rules.yaml: |
    groups:
      - name: kube-booster
        rules:
          - alert: KubeBoosterHighWarmupFailureRate
            expr: |
              (
                sum(rate(kube_booster_warmup_total{result="failure"}[5m]))
                /
                sum(rate(kube_booster_warmup_total[5m]))
              ) > 0.1
              and sum(rate(kube_booster_warmup_total[5m])) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High warmup failure rate"
              description: "More than 10% of warmups are failing in the last 5 minutes"
          - alert: KubeBoosterSlowWarmup
            expr: |
              histogram_quantile(0.95, sum(rate(kube_booster_warmup_duration_seconds_bucket[5m])) by (le))
              > 60
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Slow warmup executions"
              description: "P95 warmup duration is over 60 seconds"
          - alert: KubeBoosterWarmupBacklog
            expr: sum(kube_booster_warmup_active_pods) > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Warmup backlog building up"
              description: "More than 10 pods are actively executing warmup"
          - alert: KubeBoosterHighSemaphoreWaitTime
            expr: |
              histogram_quantile(0.95, sum(rate(kube_booster_warmup_queue_wait_seconds_bucket[5m])) by (le))
              > 10
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High warmup semaphore wait time"
              description: "P95 wait time for the warmup semaphore exceeds 10 seconds — consider increasing --max-concurrent-warmups"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: kube-booster-prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v3.4.1
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.console.libraries=/usr/share/prometheus/console_libraries
        - --web.console.templates=/usr/share/prometheus/consoles
        ports:
        - containerPort: 9090
          name: web
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        - name: config
          mountPath: /etc/prometheus/rules/rules.yaml
          subPath: rules.yaml
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
  - name: web
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
# Grafana – datasource provisioning, dashboard provisioning, and deployment
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        access: proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: kube-booster
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
